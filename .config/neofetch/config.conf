reset="\033[0m"
red="\033[1;31m"
green="\033[1;32m"
yellow="\033[1;33m"
blue="\033[1;34m"
magenta="\033[1;35m"
cyan="\033[1;36m"
white="\033[1;37m"

cl0="${reset}"
cl1="${red}"
cl2="${green}"
cl3="${yellow}"
cl4="${blue}"
cl5="${magenta}"
cl6="${cyan}"
cl7="${white}"

print_info() {
    prin "\n"
    info "${cl5} ╭─" distro
    info "${cl5} ├─" kernel
    info "${cl5} ├─" users
    info "${cl5} ├─󰏗" packages
    info "${cl5} ╰─" shell
    info "${cl4} ╭─" de
    info "${cl4} ├─" resolution
    info "${cl4} ├─" memory
    info "${cl4} ├─" disk
    info "${cl4} ├─" term
    info "${cl4} ╰─󰄉" uptime
    prin "\n"
    prin "${cl0}⬤ ${cl7}⬤ ${cl6}⬤ ${cl5}⬤ ${cl4}⬤ ${cl3}⬤ ${cl2}⬤ ${cl1}⬤"
    prin "\n"
}
